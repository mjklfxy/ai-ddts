<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-DDTS 后台登录</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f7;
        --panel: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #d8dee8;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter,
          "Microsoft YaHei",
          "PingFang SC",
          Arial,
          sans-serif;
      }

      main {
        width: min(420px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 18px 42px rgb(15 23 42 / 12%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.6;
      }

      label {
        display: block;
        margin: 16px 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        font: inherit;
      }

      input:focus {
        outline: 2px solid rgb(37 99 235 / 20%);
        border-color: var(--accent);
      }

      button {
        width: 100%;
        height: 44px;
        margin-top: 24px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI-DDTS 后台</h1>
      <p>登录后进入管理台，浏览器会保存本次登录状态。</p>
      <form method="post" action="/login">
        <input id="nextInput" type="hidden" name="next" value="/app" />
        <label for="username">账号</label>
        <input id="username" name="username" autocomplete="username" value="admin" required />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
        <button type="submit">登录</button>
      </form>
    </main>
    <script>
      const next = new URLSearchParams(window.location.search).get("next");
      if (next && next.startsWith("/") && !next.startsWith("//")) {
        document.getElementById("nextInput").value = next;
      }
    </script>
  </body>
</html>
